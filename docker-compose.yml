version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      RELOAD: "False"
      DEBUG: "False"
      BASE_CROWD_SIZE: 200
      UPDATE_INTERVAL_SECONDS: 2
      DBSCAN_INTERVAL_SECONDS: 10
      CLUSTER_ALERT_THRESHOLD: 80
      LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/density"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # For development: uncomment to mount source code
      # - ./backend:/app
    networks:
      - densityx

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - densityx

networks:
  densityx:
    driver: bridge
